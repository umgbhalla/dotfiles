# picom configuration 

backend = "glx";
unredir-if-possible = true;
vsync = true;

corner-radius = $WINDOW_BORDER_RADIUS;

#
# blur
#

blur-background = true;
blur-kern = "3x3box";
blur-method = "dual_kawase";
blur-strength = 4;

blur-background-exclude = [
  "class_g = 'slop'" # screenshot selection
]

#
# shadows
#

menu          = { shadow = false; };
dropdown_menu = { shadow = false; };
popup_menu    = { shadow = false; };
utility       = { shadow = false; };

shadow-exclude = [
  "class_g = 'firefox' && argb", # remove shadows from firefox popups and dialogs
]

#
# opacity
#

opacity-rule = [
  "${WM_TRANSPARENCY_WHOLE}:class_g = 'Lutris'",
  "${WM_TRANSPARENCY_WHOLE}:class_g = 'Gimp'",
];
